# Alembic configuration for the TEST database.
# Uses the same migrations as the main database, but targets the test DB.
#
# Usage:
#   alembic -c alembic-test.ini upgrade head
#   alembic -c alembic-test.ini downgrade base

[alembic]
# Same migration scripts as main DB
script_location = alembic

prepend_sys_path = .

version_path_separator = os

# Test database connection (port 5433, auth_test DB)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5433/auth_test


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
